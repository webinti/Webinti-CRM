# Nginx reverse proxy pour Supabase self-hosted
# À placer dans /etc/nginx/sites-available/supabase.webinti.com

# Studio (Dashboard UI)
server {
    listen 80;
    server_name supabase.webinti.com;

    # Certbot va ajouter la redirection HTTPS automatiquement
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API Supabase (Kong gateway)
server {
    listen 80;
    server_name api.supabase.webinti.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
